<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All The Good Ideas Are Already Taken — a scrollytelling short</title>
<style>
  :root{
    --bg:#0a0a0f; --ink:#f4f4f8; --dim:#9aa0b4; --accent:#7c5cff;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.4;
  }

  /* reading-progress bar (newspaper style) */
  #prog{position:fixed; top:0; left:0; height:3px; width:0; background:var(--accent); z-index:80; transition:width .08s linear}

  /* fixed vignette for cinematic depth */
  .vig{position:fixed; inset:0; pointer-events:none; box-shadow:inset 0 0 240px 70px rgba(0,0,0,.55); z-index:70}

  /* scroll hint */
  #hint{position:fixed; bottom:24px; left:0; right:0; text-align:center; z-index:75;
    color:#6b6f82; font-size:12px; letter-spacing:.22em; text-transform:uppercase; transition:opacity .5s}
  #hint .chev{display:block; margin:9px auto 0; width:13px; height:13px; border-right:2px solid #6b6f82; border-bottom:2px solid #6b6f82; transform:rotate(45deg); animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)} 50%{transform:rotate(45deg) translate(4px,4px)}}

  /* steps */
  .step{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:14vh 8vw}
  .panel{width:100%; max-width:900px; display:flex; flex-direction:column; align-items:center; text-align:center}

  /* the scrollytelling reveal: children fade/slide in when the panel hits
     the centre band, and back out when it leaves */
  .rv{opacity:0; transform:translateY(34px);
    transition:opacity .7s ease, transform .85s cubic-bezier(.2,.7,.2,1);
    transition-delay:var(--d,0s); will-change:opacity,transform}
  .panel.in .rv{opacity:1; transform:none}

  /* ---------- Opening title ---------- */
  .title{font-size:clamp(34px,7vw,92px); font-weight:800; line-height:1.04; letter-spacing:-.02em}
  .title .pop{color:var(--accent)}

  /* ---------- Deadpan idea description ---------- */
  .desc{font-size:clamp(20px,3.4vw,38px); font-weight:500; color:#d7dae4; max-width:780px; line-height:1.35; letter-spacing:-.01em}

  /* ---------- Logo + slogan ---------- */
  .ad{width:min(820px,92vw); display:flex; flex-direction:column; align-items:center}
  .logoStage{height:min(46vh,360px); display:flex; align-items:center; justify-content:center}
  .logoStage svg{max-width:92vw; height:auto; max-height:100%}
  .logoImg{max-height:min(50vh,380px); max-width:min(720px,90vw); object-fit:contain; border-radius:18px}
  .slogan{margin-top:26px; font-size:clamp(16px,2.4vw,27px); font-weight:500; color:#aeb2c2; letter-spacing:.01em}
  svg{display:block}

  @media (prefers-reduced-motion: reduce){
    .rv{transition:opacity .4s ease; transform:none}
    #hint .chev{animation:none}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
<div id="prog"></div>
<div class="vig"></div>
<main id="story"></main>
<div id="hint">Scroll<span class="chev"></span></div>

/* =========================================================================
   SCROLLYTELLING ENGINE
   Each step fills the screen; its contents reveal when the panel enters the
   centre band and hide again when it leaves — driven purely by scroll.
   ========================================================================= */
const story = document.getElementById('story');

function tagReveal(els, step){
  [...els].forEach((c,k)=>{ c.classList.add('rv'); c.style.setProperty('--d', (0.05 + k*(step||0.1)) + 's'); });
}

function build(s){
  const panel = document.createElement('div');
  panel.className = 'panel ' + s.type;

  if(s.type==='title'){
    panel.innerHTML = s.html;
    tagReveal(panel.children, 0.12);

  } else if(s.type==='desc'){
    const d = document.createElement('div'); d.className = 'desc'; d.textContent = s.t;
    panel.appendChild(d);
    tagReveal([d], 0.1);

  } else if(s.type==='ad'){
    // Prefer a supplied raster illustration (e.g. an image-model logo);
    // fall back to the hand-coded SVG if the file is missing.
    const mark = s.img
      ? `<img src="${s.img}" alt="${s.slogan} logo" class="logoImg" onerror="this.outerHTML=LOGOS['${s.logo}']">`
      : LOGOS[s.logo];
    const ad = document.createElement('div'); ad.className = 'ad';
    ad.innerHTML = `<div class="logoStage">${mark}</div>
      <div class="slogan">${s.slogan}</div>`;
    panel.appendChild(ad);
    tagReveal(ad.children, 0.14);
  }
  return panel;
}

S.forEach(s=>{
  const sec = document.createElement('section'); sec.className = 'step';
  sec.appendChild(build(s));
  story.appendChild(sec);
});

/* Reveal panels whose centre sits in the middle of the viewport; hide as they
   leave. Scroll-driven with a rAF throttle. getBoundingClientRect keeps it
   robust, and a viewport-height fallback avoids a blank page in odd contexts. */
const panels = [...document.querySelectorAll('.panel')];
const prog = document.getElementById('prog');
const hint = document.getElementById('hint');
let ticking = false;

function vh(){ return window.innerHeight || document.documentElement.clientHeight || 800; }

function reveal(){
  const v = vh();
  panels.forEach(p=>{
    const r = p.getBoundingClientRect();
    const c = r.top + r.height/2;            // panel centre, in viewport coords
    p.classList.toggle('in', c > v*0.16 && c < v*0.84);
  });
}
function progress(){
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  prog.style.width = (max>0 ? h.scrollTop/max*100 : 0) + '%';
  if(h.scrollTop > 40) hint.style.opacity = 0;
}
function tick(){ if(!ticking){ ticking = true; requestAnimationFrame(()=>{ reveal(); progress(); ticking = false; }); } }

addEventListener('scroll', tick, {passive:true});
addEventListener('resize', tick, {passive:true});
addEventListener('load', ()=>{ reveal(); progress(); });
reveal(); progress();
/* never leave the opening screen blank */
if(!document.querySelector('.panel.in') && panels[0]) panels[0].classList.add('in');
</script>
